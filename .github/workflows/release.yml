name: Release

on:
  push:
    tags:
      - "v*"
  # Lets you dry-run the build from the Actions tab without publishing anything.
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}

jobs:
  build:
    name: build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: linux-x86_64
          - os: windows-latest
            target: windows-x86_64
          - os: macos-latest
            target: macos-arm64
          - os: macos-15-intel
            target: macos-x86_64

    steps:
      - uses: actions/checkout@v7

      # The interpreter has to be setup-python's rather than uv's managed CPython:
      # uv's builds ship Tcl/Tk 9, whose shared libraries PyInstaller 6.21 fails to
      # collect, producing a suica-viewer-gui that dies on `import tkinter`.
      # packaging/suica-viewer.spec fails the build if that ever regresses.
      - uses: actions/setup-python@v6
        id: python
        with:
          python-version: "3.14"

      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        env:
          UV_PYTHON: ${{ steps.python.outputs.python-path }}
        run: uv sync --frozen --no-dev --group build

      - name: Build executables
        run: uv run --no-sync pyinstaller --clean --noconfirm packaging/suica-viewer.spec

      - name: Stage release assets
        shell: bash
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ github.ref_name }}
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then ext=".exe"; else ext=""; fi
          mkdir -p assets
          for name in suica-viewer suica-viewer-gui; do
            cp "dist/${name}${ext}" "assets/${name}-${VERSION}-${TARGET}${ext}"
          done

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.target }}
          path: assets/*
          if-no-files-found: error

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          path: assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: assets
        run: |
          sha256sum * > "$RUNNER_TEMP/SHA256SUMS.txt"
          mv "$RUNNER_TEMP/SHA256SUMS.txt" .

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" assets/* --clobber
          else
            gh release create "$TAG" --title "$TAG" --generate-notes assets/*
          fi
