<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Suica ビューア</title>
    <style>
      :root {
        --bg: #f3f4f8;
        --surface: #ffffff;
        --border: #e2e5ee;
        --text: #111827;
        --muted: #6b7280;
        --heading: #1f2937;
        --accent: #4c6ef5;
        --hero-from: #4c6ef5;
        --hero-to: #6d8bff;
        --hero-fg: #ffffff;
        --hero-sub: #dbe4ff;
        --row-alt: #f5f7fb;
        --charge: #0f7b3f;
        --shadow:
          0 1px 3px rgba(17, 24, 39, 0.08), 0 1px 2px rgba(17, 24, 39, 0.04);
        --tab-fg: #4b5563;
        --pill: #eef1f7;
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
          --bg: #1e1f26;
          --surface: #2a2c36;
          --border: #3a3d49;
          --text: #e5e7eb;
          --muted: #9ca3af;
          --heading: #f3f4f6;
          --accent: #7c93ff;
          --hero-from: #3b4bbf;
          --hero-to: #5566d6;
          --hero-sub: #c7d0ff;
          --row-alt: #31333f;
          --charge: #4ade80;
          --shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
          --tab-fg: #9ca3af;
          --pill: #31333f;
        }
      }
      :root[data-theme="dark"] {
        --bg: #1e1f26;
        --surface: #2a2c36;
        --border: #3a3d49;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --heading: #f3f4f6;
        --accent: #7c93ff;
        --hero-from: #3b4bbf;
        --hero-to: #5566d6;
        --hero-sub: #c7d0ff;
        --row-alt: #31333f;
        --charge: #4ade80;
        --shadow: 0 1px 3px rgba(0, 0, 0, 0.4);
        --tab-fg: #9ca3af;
        --pill: #31333f;
      }

      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family:
          -apple-system, "Hiragino Kaku Gothic ProN", "Noto Sans JP", Meiryo,
          system-ui, sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }
      .wrap {
        max-width: 1180px;
        margin: 0 auto;
        padding: 24px 20px 60px;
      }

      header.top {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      header.top h1 {
        font-size: 18px;
        margin: 0;
        color: var(--heading);
        font-weight: 700;
      }
      .status {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-weight: 600;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--muted);
        flex: none;
      }
      .dot.waiting {
        background: #f59e0b;
      }
      .dot.reading {
        background: var(--accent);
        animation: pulse 1s infinite;
      }
      .dot.done {
        background: #16a34a;
      }
      .dot.error {
        background: #dc2626;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
      .spacer {
        flex: 1 1 auto;
      }
      .meta {
        color: var(--muted);
        font-size: 12px;
      }
      button.ghost {
        font: inherit;
        cursor: pointer;
        border: 1px solid var(--border);
        background: var(--surface);
        color: var(--text);
        border-radius: 8px;
        padding: 6px 12px;
      }
      button.ghost:hover {
        border-color: var(--accent);
      }

      .progress {
        height: 6px;
        background: var(--border);
        border-radius: 99px;
        margin: 14px 0 18px;
        overflow: hidden;
      }
      .progress > i {
        display: block;
        height: 100%;
        width: 0;
        background: var(--accent);
        border-radius: 99px;
        transition: width 0.25s ease;
      }
      .progress.idle {
        visibility: hidden;
      }

      .tabs {
        display: flex;
        gap: 4px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .tabs button {
        font: inherit;
        cursor: pointer;
        border: 0;
        background: none;
        color: var(--tab-fg);
        padding: 10px 16px;
        border-radius: 8px 8px 0 0;
        font-weight: 600;
        position: relative;
        top: 1px;
      }
      .tabs button[aria-selected="true"] {
        color: var(--text);
        border-bottom: 2px solid var(--accent);
      }

      .hero {
        background: linear-gradient(120deg, var(--hero-from), var(--hero-to));
        color: var(--hero-fg);
        border-radius: 16px;
        padding: 22px 26px;
        margin-bottom: 20px;
        box-shadow: var(--shadow);
      }
      .hero .cap {
        color: var(--hero-sub);
        font-weight: 700;
        letter-spacing: 0.04em;
        font-size: 13px;
      }
      .hero .amount {
        font-size: 40px;
        font-weight: 800;
        margin: 2px 0 6px;
        letter-spacing: -0.01em;
      }
      .hero .sub {
        color: var(--hero-sub);
        font-size: 14px;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 14px;
        box-shadow: var(--shadow);
        margin-bottom: 18px;
      }
      .card > h2 {
        font-size: 13px;
        font-weight: 700;
        color: var(--muted);
        margin: 0;
        padding: 14px 18px 0;
        letter-spacing: 0.02em;
      }
      .card > .body {
        padding: 12px 18px 16px;
      }
      .grid {
        display: grid;
        grid-template-columns: max-content 1fr;
        gap: 8px 18px;
        align-items: baseline;
      }
      .grid dt {
        color: var(--muted);
        font-weight: 600;
      }
      .grid dd {
        margin: 0;
        word-break: break-word;
      }
      .cols {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
        gap: 18px;
      }

      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        flex-wrap: wrap;
        margin-bottom: 12px;
      }
      input[type="search"] {
        font: inherit;
        padding: 8px 12px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        flex: 1 1 260px;
        min-width: 200px;
      }

      .tablewrap {
        overflow-x: auto;
        border: 1px solid var(--border);
        border-radius: 12px;
      }
      table {
        border-collapse: collapse;
        width: 100%;
        font-variant-numeric: tabular-nums;
      }
      th,
      td {
        padding: 9px 12px;
        text-align: left;
        white-space: nowrap;
      }
      thead th {
        background: var(--pill);
        color: var(--heading);
        font-size: 12.5px;
        font-weight: 700;
        cursor: pointer;
        user-select: none;
        position: sticky;
        top: 0;
      }
      thead th.num {
        text-align: right;
      }
      thead th .arrow {
        color: var(--muted);
        font-size: 10px;
        margin-left: 4px;
      }
      tbody tr:nth-child(even) {
        background: var(--row-alt);
      }
      td.num {
        text-align: right;
      }
      tr.charge td {
        color: var(--charge);
        font-weight: 600;
      }
      .muted {
        color: var(--muted);
      }
      .empty {
        padding: 26px;
        text-align: center;
        color: var(--muted);
      }

      pre.json {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        overflow: auto;
        max-height: 60vh;
        margin: 0;
        font-size: 12.5px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <header class="top">
        <h1>Suica ビューア</h1>
        <span class="status"
          ><span class="dot" id="dot"></span
          ><span id="statusText">接続しています…</span></span
        >
        <span class="spacer"></span>
        <span class="meta" id="readAt">読取日時: —</span>
        <button class="ghost" id="themeBtn" title="テーマ切替">
          🌙 ダーク
        </button>
      </header>

      <div class="progress idle" id="progressWrap">
        <i id="progressBar"></i>
      </div>

      <nav class="tabs" id="tabs" role="tablist">
        <button role="tab" data-tab="overview" aria-selected="true">
          概要
        </button>
        <button role="tab" data-tab="cardinfo" aria-selected="false">
          カード情報
        </button>
        <button role="tab" data-tab="history" aria-selected="false">
          取引履歴
        </button>
        <button role="tab" data-tab="gates" aria-selected="false">改札</button>
        <button role="tab" data-tab="data" aria-selected="false">データ</button>
      </nav>

      <section id="tab-overview"></section>
      <section id="tab-cardinfo" class="hidden"></section>
      <section id="tab-history" class="hidden"></section>
      <section id="tab-gates" class="hidden"></section>
      <section id="tab-data" class="hidden"></section>
    </div>

    <script>
      "use strict";
      const $ = (sel, el = document) => el.querySelector(sel);
      const state = {
        card: null,
        readAt: null,
        filter: "",
        sort: { key: null, dir: 1 },
      };

      // ---- formatting helpers ----
      const yen = (v) =>
        typeof v === "number" ? v.toLocaleString("ja-JP") + " 円" : "—";
      const delta = (v) => {
        if (typeof v !== "number") return "—";
        return (v > 0 ? "+" : "") + v.toLocaleString("ja-JP") + " 円";
      };
      const dash = (v) =>
        v === null || v === undefined || v === "" ? "—" : String(v);
      const hhmm = (h) =>
        typeof h === "string" && h.length >= 4
          ? `${h.slice(0, 2)}:${h.slice(2, 4)}`
          : "—";
      const hasValue = (v) =>
        v !== null && v !== undefined && v !== "" && v !== "—";
      const hasCommuter = (c) => c && hasValue(c.valid_from);

      // ---- DOM builders ----
      function el(tag, attrs = {}, ...kids) {
        const node = document.createElement(tag);
        for (const [k, v] of Object.entries(attrs)) {
          if (k === "class") node.className = v;
          else if (k === "text") node.textContent = v;
          else if (k.startsWith("on") && typeof v === "function")
            node.addEventListener(k.slice(2), v);
          else node.setAttribute(k, v);
        }
        for (const kid of kids) if (kid != null) node.append(kid);
        return node;
      }
      function card(title, bodyNode) {
        return el(
          "div",
          { class: "card" },
          el("h2", { text: title }),
          el("div", { class: "body" }, bodyNode),
        );
      }
      function kvGrid(pairs) {
        const dl = el("dl", { class: "grid" });
        for (const [label, value] of pairs) {
          dl.append(el("dt", { text: label }), el("dd", { text: dash(value) }));
        }
        return dl;
      }
      function emptyCard(title, message) {
        return card(title, el("div", { class: "empty", text: message }));
      }

      // ---- tab renderers ----
      function renderOverview() {
        const root = $("#tab-overview");
        root.replaceChildren();
        const c = state.card;
        const hero = el(
          "div",
          { class: "hero" },
          el("div", { class: "cap", text: "残高" }),
          el("div", {
            class: "amount",
            text: c ? yen(c.attribute.balance) : "—",
          }),
          el("div", {
            class: "sub",
            text: c
              ? [c.attribute.card_type, c.issue_primary.issuer_id]
                  .filter(hasValue)
                  .join("  ·  ") || "カード読取済み"
              : "カードをかざしてください",
          }),
        );
        root.append(hero);
        if (!c) {
          root.append(
            emptyCard("カード識別", "カードが読み取られていません。"),
          );
          return;
        }

        const cols = el("div", { class: "cols" });
        cols.append(
          card(
            "カード識別",
            kvGrid([
              ["IDm", c.system.idm_hex],
              ["PMm", c.system.pmm_hex],
              ["IDi", c.system.idi_display],
              ["PMi", c.system.pmi],
              ["カード種別", c.attribute.card_type],
              ["発行者", c.issue_primary.issuer_id],
            ]),
          ),
          card(
            "利用サマリ",
            kvGrid([
              ["残高", yen(c.attribute.balance)],
              ["最終チャージ金額", yen(c.last_topup.amount)],
              [
                "取引通番",
                c.attribute.transaction_number?.toLocaleString("ja-JP"),
              ],
            ]),
          ),
          card(
            "発行・有効情報",
            kvGrid([
              ["発行日", c.issue_primary.issued_at],
              ["有効期限", c.issue_primary.expires_at],
              ["発行駅", c.issue_primary.issued_station],
            ]),
          ),
          card(
            "定期券ハイライト",
            kvGrid(
              hasCommuter(c.commuter)
                ? [
                    [
                      "区間",
                      `${c.commuter.start_station} → ${c.commuter.end_station}`,
                    ],
                    [
                      "有効期間",
                      `${c.commuter.valid_from} 〜 ${c.commuter.valid_to}`,
                    ],
                  ]
                : [
                    ["区間", "—"],
                    ["状態", "定期券なし"],
                  ],
            ),
          ),
        );
        root.append(cols);
      }

      function renderCardInfo() {
        const root = $("#tab-cardinfo");
        root.replaceChildren();
        const c = state.card;
        if (!c) {
          root.append(
            emptyCard("カード情報", "カードが読み取られていません。"),
          );
          return;
        }
        const i = c.issue_primary,
          a = c.attribute,
          t = c.last_topup,
          cm = c.commuter;
        const cols = el("div", { class: "cols" });
        cols.append(
          card(
            "発行情報",
            kvGrid([
              ["所有者名", i.owner_name],
              ["生年月日", i.owner_birthdate],
              ["電話番号(hex)", i.owner_phone_hex],
              ["年齢コード", i.owner_age_code],
              ["第二発行ID", i.secondary_issue_id],
              ["発行者ID", i.issuer_id],
              ["デポジット額", yen(i.deposit)],
              ["発行機器", i.issued_by],
              ["発行駅", i.issued_station],
              ["発行日", i.issued_at],
              ["有効期限", i.expires_at],
            ]),
          ),
          card(
            "カード属性",
            kvGrid([
              ["カード種別", a.card_type],
              [
                "地域",
                `${a.region} (0x${a.region.toString(16).padStart(2, "0").toUpperCase()})`,
              ],
              ["残高", yen(a.balance)],
              ["取引通番", a.transaction_number?.toLocaleString("ja-JP")],
            ]),
          ),
          card(
            "最終チャージ情報",
            kvGrid([
              ["チャージ機器", t.equipment],
              ["チャージ駅", t.station],
              ["チャージ金額", yen(t.amount)],
            ]),
          ),
          card(
            "定期券情報",
            hasCommuter(cm)
              ? kvGrid([
                  ["開始日", cm.valid_from],
                  ["終了日", cm.valid_to],
                  ["始点駅", cm.start_station],
                  ["終点駅", cm.end_station],
                  ["経由駅1", cm.via1_station],
                  ["経由駅2", cm.via2_station],
                  ["発行日", cm.issued_at],
                ])
              : el("div", { class: "empty", text: "定期券なし" }),
          ),
        );
        root.append(cols);
      }

      const HISTORY_COLS = [
        {
          key: "when",
          label: "日時",
          get: (e) => `${e.recorded_on} ${e.transaction_time || ""}`.trim(),
        },
        {
          key: "transaction_type",
          label: "取引種別",
          get: (e) => e.transaction_type,
        },
        { key: "pay_type", label: "支払種別", get: (e) => e.pay_type },
        {
          key: "gate_instruction_type",
          label: "改札処理",
          get: (e) => e.gate_instruction_type,
        },
        {
          key: "entry_station",
          label: "入場駅",
          get: (e) =>
            e.transaction_type_code === 0x46 ? "—" : dash(e.entry_station),
        },
        {
          key: "exit_station",
          label: "出場駅",
          get: (e) =>
            e.transaction_type_code === 0x46 ? "—" : dash(e.exit_station),
        },
        { key: "delta", label: "差額", num: true, get: (e) => delta(e.delta) },
        {
          key: "balance",
          label: "残高",
          num: true,
          get: (e) => yen(e.balance),
        },
        { key: "recorded_by", label: "機器", get: (e) => e.recorded_by },
        {
          key: "transaction_number",
          label: "通番",
          num: true,
          get: (e) => e.transaction_number?.toLocaleString("ja-JP") ?? "—",
        },
      ];

      function renderHistory() {
        const root = $("#tab-history");
        root.replaceChildren();
        const c = state.card;
        const toolbar = el(
          "div",
          { class: "toolbar" },
          el("input", {
            type: "search",
            placeholder: "フィルター (全文検索)…",
            value: state.filter,
            oninput: (e) => {
              state.filter = e.target.value;
              renderHistoryTable();
            },
          }),
          el("button", {
            class: "ghost",
            text: "クリア",
            onclick: () => {
              state.filter = "";
              renderHistory();
            },
          }),
        );
        root.append(toolbar, el("div", { id: "historyTable" }));
        renderHistoryTable();
        if (!c)
          $("#historyTable").append(
            el("div", {
              class: "empty",
              text: "カードが読み取られていません。",
            }),
          );
      }

      function filteredSortedHistory() {
        const c = state.card;
        if (!c) return [];
        let rows = c.transaction_history.slice();
        const q = state.filter.trim().toLowerCase();
        if (q) {
          rows = rows.filter((e) =>
            HISTORY_COLS.some((col) =>
              String(col.get(e) ?? "")
                .toLowerCase()
                .includes(q),
            ),
          );
        }
        const s = state.sort;
        if (s.key) {
          const col = HISTORY_COLS.find((c) => c.key === s.key);
          rows.sort((a, b) => {
            let x, y;
            if (col.num) {
              x = a[s.key === "when" ? "recorded_on" : s.key];
              y = b[s.key === "when" ? "recorded_on" : s.key];
              x = x ?? -Infinity;
              y = y ?? -Infinity;
              return (x - y) * s.dir;
            }
            x = String(col.get(a) ?? "");
            y = String(col.get(b) ?? "");
            return x.localeCompare(y, "ja") * s.dir;
          });
        }
        return rows;
      }

      function renderHistoryTable() {
        const host = $("#historyTable");
        if (!host) return;
        host.replaceChildren();
        const c = state.card;
        if (!c) return;
        const rows = filteredSortedHistory();
        const thead = el("thead"),
          htr = el("tr");
        for (const col of HISTORY_COLS) {
          const arrow =
            state.sort.key === col.key
              ? state.sort.dir === 1
                ? "▲"
                : "▼"
              : "";
          htr.append(
            el(
              "th",
              { class: col.num ? "num" : "", onclick: () => sortBy(col.key) },
              col.label,
              el("span", { class: "arrow", text: arrow }),
            ),
          );
        }
        thead.append(htr);
        const tbody = el("tbody");
        for (const e of rows) {
          const tr = el("tr");
          if (typeof e.delta === "number" && e.delta > 0)
            tr.className = "charge";
          for (const col of HISTORY_COLS)
            tr.append(
              el("td", { class: col.num ? "num" : "", text: dash(col.get(e)) }),
            );
          tbody.append(tr);
        }
        const table = el("table", {}, thead, tbody);
        host.append(el("div", { class: "tablewrap" }, table));
        if (rows.length === 0)
          host.append(
            el("div", {
              class: "empty",
              text: state.filter
                ? "該当する取引がありません。"
                : "取引履歴なし",
            }),
          );
      }

      function sortBy(key) {
        const s = state.sort;
        if (s.key === key) s.dir = -s.dir;
        else {
          s.key = key;
          s.dir = 1;
        }
        renderHistoryTable();
      }

      const PAID_COLS = [
        { label: "発駅", get: (e) => e.depart_station },
        { label: "着駅", get: (e) => e.arrive_station },
        { label: "有効期限", get: (e) => e.expires_at },
        { label: "金額", num: true, get: (e) => yen(e.amount) },
        { label: "発券時刻", get: (e) => e.issued_time },
        { label: "発券種別", get: (e) => e.issue_type_hex },
        { label: "装置番号", get: (e) => e.device_id_hex },
        { label: "改札実施駅", get: (e) => e.checked_station },
        { label: "改札実施時刻", get: (e) => e.checked_time },
      ];

      function colTable(cols, rows) {
        const thead = el(
          "thead",
          {},
          el(
            "tr",
            {},
            ...cols.map((col) =>
              el("th", { class: col.num ? "num" : "", text: col.label }),
            ),
          ),
        );
        const tbody = el("tbody");
        for (const e of rows) {
          tbody.append(
            el(
              "tr",
              {},
              ...cols.map((col) =>
                el("td", {
                  class: col.num ? "num" : "",
                  text: dash(col.get(e)),
                }),
              ),
            ),
          );
        }
        return el("div", { class: "tablewrap" }, el("table", {}, thead, tbody));
      }

      const GATE_COLS = [
        { label: "日時", get: (e) => `${dash(e.date)} ${e.time || ""}`.trim() },
        { label: "入出場種別", get: (e) => e.gate_in_out_type },
        { label: "中間処理", get: (e) => e.intermediate_gate_instruction_type },
        { label: "駅", get: (e) => e.station },
        { label: "装置番号", get: (e) => e.device_id_hex },
        { label: "金額", num: true, get: (e) => yen(e.amount) },
        { label: "定期運賃", num: true, get: (e) => yen(e.commuter_pass_fee) },
        { label: "定期駅", get: (e) => e.commuter_station },
      ];

      function renderGates() {
        const root = $("#tab-gates");
        root.replaceChildren();
        const c = state.card;
        if (!c) {
          root.append(emptyCard("改札", "カードが読み取られていません。"));
          return;
        }

        const gateBody = el("div");
        if (c.gate.length === 0) {
          gateBody.append(
            el("div", { class: "empty", text: "改札入出場記録なし" }),
          );
        } else {
          const thead = el(
            "thead",
            {},
            el(
              "tr",
              {},
              ...GATE_COLS.map((col) =>
                el("th", { class: col.num ? "num" : "", text: col.label }),
              ),
            ),
          );
          const tbody = el("tbody");
          for (const e of c.gate) {
            tbody.append(
              el(
                "tr",
                {},
                ...GATE_COLS.map((col) =>
                  el("td", {
                    class: col.num ? "num" : "",
                    text: dash(col.get(e)),
                  }),
                ),
              ),
            );
          }
          gateBody.append(
            el("div", { class: "tablewrap" }, el("table", {}, thead, tbody)),
          );
        }
        root.append(card("改札入出場履歴", gateBody));

        const sf = c.sf_gate;
        if (sf && sf.has_record) {
          root.append(
            card(
              "SF改札入場情報",
              kvGrid([
                ["入場駅", sf.entry_station],
                ["中間改札入場駅", sf.intermediate_entry_station],
                ["中間改札入場日付", sf.intermediate_entry_date],
                ["中間改札入場時刻", hhmm(sf.intermediate_entry_time)],
                ["中間改札出場駅", sf.intermediate_exit_station],
                ["中間改札出場時刻", hhmm(sf.intermediate_exit_time)],
              ]),
            ),
          );
        } else {
          root.append(emptyCard("SF改札入場情報", "記録なし"));
        }

        const paid = c.paid_ticket || [];
        if (paid.length) {
          root.append(card("料金発券・改札情報", colTable(PAID_COLS, paid)));
        } else {
          root.append(
            emptyCard(
              "料金発券・改札情報",
              c.paid_ticket_available
                ? "記録なし"
                : c.paid_ticket_reason || "記録なし",
            ),
          );
        }
      }

      function renderData() {
        const root = $("#tab-data");
        root.replaceChildren();
        const c = state.card;
        const tools = el(
          "div",
          { class: "toolbar" },
          el("button", {
            class: "ghost",
            text: "JSONをコピー",
            onclick: copyJson,
          }),
          el("button", {
            class: "ghost",
            text: "JSONを保存",
            onclick: () =>
              download(
                "suica_card.json",
                JSON.stringify(c, null, 2),
                "application/json",
              ),
          }),
          el("button", {
            class: "ghost",
            text: "履歴をCSVで保存",
            onclick: exportCsv,
          }),
        );
        const pre = el("pre", {
          class: "json",
          text: c
            ? JSON.stringify(c, null, 2)
            : "// カードが読み取られていません",
        });
        root.append(card("カード情報 JSON", el("div", {}, tools, pre)));
        for (const b of tools.querySelectorAll("button")) b.disabled = !c;
      }

      // ---- data actions ----
      async function copyJson() {
        if (!state.card) return;
        try {
          await navigator.clipboard.writeText(
            JSON.stringify(state.card, null, 2),
          );
          setStatus("done", "JSON をコピーしました。");
        } catch {
          setStatus("error", "コピーに失敗しました。");
        }
      }
      function download(name, text, type) {
        const blob = new Blob([type.includes("csv") ? "﻿" + text : text], {
          type,
        });
        const a = el("a", { href: URL.createObjectURL(blob), download: name });
        document.body.append(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(a.href);
      }
      const CSV_COLS = [
        ["日付", (e) => e.recorded_on],
        ["時刻", (e) => e.transaction_time ?? ""],
        ["取引種別", (e) => e.transaction_type],
        ["支払種別", (e) => e.pay_type],
        ["改札処理", (e) => e.gate_instruction_type],
        ["入場駅", (e) => e.entry_station ?? ""],
        ["出場駅", (e) => e.exit_station ?? ""],
        ["差額", (e) => e.delta ?? ""],
        ["残高", (e) => e.balance],
        ["機器", (e) => e.recorded_by],
        ["通番", (e) => e.transaction_number],
      ];
      function csvCell(v) {
        const s = String(v ?? "");
        return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
      }
      function exportCsv() {
        if (!state.card) return;
        const lines = [CSV_COLS.map((c) => c[0]).join(",")];
        for (const e of state.card.transaction_history)
          lines.push(CSV_COLS.map((c) => csvCell(c[1](e))).join(","));
        download("suica_history.csv", lines.join("\r\n"), "text/csv");
      }

      // ---- tabs ----
      const renderers = {
        overview: renderOverview,
        cardinfo: renderCardInfo,
        history: renderHistory,
        gates: renderGates,
        data: renderData,
      };
      let activeTab = "overview";
      function selectTab(name) {
        activeTab = name;
        for (const btn of $("#tabs").querySelectorAll("button"))
          btn.setAttribute("aria-selected", btn.dataset.tab === name);
        for (const sec of document.querySelectorAll("section[id^='tab-']"))
          sec.classList.toggle("hidden", sec.id !== `tab-${name}`);
        renderers[name]();
      }
      $("#tabs").addEventListener("click", (e) => {
        const b = e.target.closest("button");
        if (b) selectTab(b.dataset.tab);
      });

      function renderAll() {
        renderers[activeTab]();
      }

      // ---- status / progress ----
      function setStatus(stateName, message) {
        $("#dot").className = "dot " + (stateName || "");
        $("#statusText").textContent = message;
      }
      function setProgress(v) {
        const wrap = $("#progressWrap");
        wrap.classList.toggle("idle", !(v > 0 && v < 100));
        $("#progressBar").style.width = Math.max(0, Math.min(100, v)) + "%";
      }

      // ---- theme ----
      function applyTheme(mode) {
        if (mode === "system")
          document.documentElement.removeAttribute("data-theme");
        else document.documentElement.setAttribute("data-theme", mode);
        const isDark =
          mode === "dark" ||
          (mode === "system" &&
            matchMedia("(prefers-color-scheme: dark)").matches);
        $("#themeBtn").textContent = isDark ? "☀ ライト" : "🌙 ダーク";
        localStorage.setItem("suica-theme", mode);
      }
      let themeMode = localStorage.getItem("suica-theme") || "system";
      applyTheme(themeMode);
      $("#themeBtn").addEventListener("click", () => {
        themeMode = themeMode === "dark" ? "light" : "dark";
        applyTheme(themeMode);
      });

      // ---- SSE stream ----
      function connect() {
        const es = new EventSource("/api/stream");
        es.onmessage = (ev) => {
          let msg;
          try {
            msg = JSON.parse(ev.data);
          } catch {
            return;
          }
          handle(msg);
        };
        es.onerror = () =>
          setStatus("error", "サーバとの接続が切れました。再接続しています…");
      }
      function handle(msg) {
        switch (msg.type) {
          case "status":
            setStatus(msg.state, msg.message);
            if (msg.state !== "reading") setProgress(0);
            break;
          case "progress":
            setProgress(msg.value);
            break;
          case "error":
            setStatus("error", msg.message);
            setProgress(0);
            break;
          case "removed":
            state.card = null;
            state.readAt = null;
            $("#readAt").textContent = "読取日時: —";
            setProgress(0);
            renderAll();
            break;
          case "card":
            state.card = msg.data;
            state.readAt = msg.read_at;
            $("#readAt").textContent = "読取日時: " + (msg.read_at || "—");
            setProgress(100);
            renderAll();
            break;
        }
      }

      // Optional deep-linking: ?tab=history&theme=dark  (&live=0 = one-shot snapshot, no live stream)
      const params = new URLSearchParams(location.search);
      if (["light", "dark", "system"].includes(params.get("theme"))) {
        themeMode = params.get("theme");
        applyTheme(themeMode);
      }
      selectTab(renderers[params.get("tab")] ? params.get("tab") : "overview");
      if (params.get("live") === "0") {
        fetch("/api/card")
          .then((r) => r.json())
          .then((j) => {
            if (j.card) {
              state.card = j.card;
              state.readAt = j.read_at;
              $("#readAt").textContent = "読取日時: " + (j.read_at || "—");
            }
            setStatus("done", j.card ? "スナップショット表示" : "カードなし");
            renderAll();
          });
      } else {
        connect();
      }
    </script>
  </body>
</html>
